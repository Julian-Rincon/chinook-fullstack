name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: chinook-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing -q

  frontend-test-build:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Resolve backend private IP
        id: backend_target
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_PRIVATE_IP="${{ secrets.BACKEND_PRIVATE_IP }}"

          if [[ -z "${BACKEND_PRIVATE_IP}" ]]; then
            BACKEND_PRIVATE_IP="${{ secrets.BACKEND_UPSTREAM }}"
            BACKEND_PRIVATE_IP="${BACKEND_PRIVATE_IP#http://}"
            BACKEND_PRIVATE_IP="${BACKEND_PRIVATE_IP#https://}"
            BACKEND_PRIVATE_IP="${BACKEND_PRIVATE_IP%%/*}"
            BACKEND_PRIVATE_IP="${BACKEND_PRIVATE_IP%%:*}"
          fi

          if [[ -z "${BACKEND_PRIVATE_IP}" ]]; then
            echo "Missing BACKEND_PRIVATE_IP and BACKEND_UPSTREAM secrets." >&2
            exit 1
          fi

          echo "backend_private_ip=${BACKEND_PRIVATE_IP}" >> "${GITHUB_OUTPUT}"

      - name: Prepare SSH key, config, and known hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          printf '%s' "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config <<EOF
          Host frontend-target
            HostName ${{ secrets.FRONTEND_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30

          Host backend-target
            HostName ${{ steps.backend_target.outputs.backend_private_ip }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            ProxyJump frontend-target
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config

          ssh-keyscan -H "${{ secrets.FRONTEND_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Validate SSH connectivity
        shell: bash
        run: |
          set -euo pipefail
          ssh frontend-target "echo frontend-ok"
          ssh backend-target "echo backend-ok"

      - name: Upload backend app and repo-managed scripts through frontend jump host
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete -e "ssh" backend/ backend-target:/tmp/chinook/backend/
          rsync -az --delete -e "ssh" infra/ backend-target:/tmp/chinook/infra/

      - name: Upload frontend artifact and repo-managed scripts
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete -e "ssh" frontend/dist/ frontend-target:/tmp/chinook/frontend-dist/
          rsync -az --delete -e "ssh" infra/ frontend-target:/tmp/chinook/infra/

      - name: Deploy backend through frontend jump host
        shell: bash
        run: |
          set -euo pipefail
          ssh backend-target "sudo /bin/bash /tmp/chinook/infra/scripts/deploy_backend.sh"

      - name: Deploy frontend
        shell: bash
        run: |
          set -euo pipefail
          ssh frontend-target \
            "sudo BACKEND_UPSTREAM='http://${{ steps.backend_target.outputs.backend_private_ip }}:8000' SERVER_NAME='${{ secrets.FRONTEND_SERVER_NAME }}' /bin/bash /tmp/chinook/infra/scripts/deploy_frontend.sh"

      - name: Smoke test backend health through frontend jump host
        shell: bash
        run: |
          set -euo pipefail
          ssh backend-target "bash /tmp/chinook/infra/scripts/smoke_test.sh http://127.0.0.1:8000 /health"

      - name: Smoke test public frontend path
        shell: bash
        run: |
          set -euo pipefail
          bash infra/scripts/smoke_test.sh "${{ secrets.FRONTEND_BASE_URL }}" /api/health
