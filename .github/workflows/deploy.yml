name: CI/CD Chinook Fullstack

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    # 👇 ESTO ES LO CLAVE para que se apliquen las "protection rules" del Environment
    environment:
      name: production
      url: http://${{ secrets.FRONTEND_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup SSH (from base64)
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H ${{ secrets.BACKEND_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.FRONTEND_HOST }} >> ~/.ssh/known_hosts

          # sanity check (no imprime secretos)
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes ubuntu@${{ secrets.BACKEND_HOST }} "echo SSH_BACKEND_OK"
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes ubuntu@${{ secrets.FRONTEND_HOST }} "echo SSH_FRONTEND_OK"

      - name: Deploy backend
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" backend/ ubuntu@${{ secrets.BACKEND_HOST }}:/tmp/chinook-backend/
          ssh -i ~/.ssh/id_ed25519 ubuntu@${{ secrets.BACKEND_HOST }} "sudo bash /usr/local/bin/deploy_backend.sh"

      - name: Deploy frontend
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" frontend/dist/ ubuntu@${{ secrets.FRONTEND_HOST }}:/tmp/chinook-frontend-dist/
          ssh -i ~/.ssh/id_ed25519 ubuntu@${{ secrets.FRONTEND_HOST }} "sudo bash /usr/local/bin/deploy_frontend.sh"

      - name: Smoke test (frontend -> /api/health)
        run: |
          curl -sS --fail http://${{ secrets.FRONTEND_HOST }}/api/health
