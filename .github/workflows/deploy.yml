name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  # Only allow one production deployment workflow per branch at a time.
  # This prevents two pushes from racing and deploying out of order.
  group: chinook-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing -q

  frontend-test-build:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Prepare SSH key and known hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          # The private key is stored base64-encoded in GitHub secrets so the
          # original line breaks are preserved safely.
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Trust the backend and frontend hosts for non-interactive SSH/rsync.
          ssh-keyscan -H "${{ secrets.BACKEND_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.FRONTEND_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload backend app and repo-managed scripts
        shell: bash
        run: |
          set -euo pipefail
          # Copy the backend source and the infra folder directly from the repo.
          # The deployment scripts live in the repository, not on the server.
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            backend/ "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}:/tmp/chinook/backend/"
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            infra/ "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}:/tmp/chinook/infra/"

      - name: Upload frontend artifact and repo-managed scripts
        shell: bash
        run: |
          set -euo pipefail
          # Copy the built frontend artifact plus the infra folder to the
          # frontend EC2. Nginx will serve the artifact from /var/www/chinook.
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            frontend/dist/ "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/chinook/frontend-dist/"
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            infra/ "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/chinook/infra/"

      - name: Deploy backend
        shell: bash
        run: |
          set -euo pipefail

          # Run the backend deployment script that came from this repository.
          # No /usr/local/bin server-side script is assumed.
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}" \
            "sudo /bin/bash /tmp/chinook/infra/scripts/deploy_backend.sh"

      - name: Deploy frontend
        shell: bash
        run: |
          set -euo pipefail

          # The frontend deploy script renders the Nginx config using the
          # backend private URL and the public frontend server name.
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}" \
            "sudo BACKEND_UPSTREAM='${{ secrets.BACKEND_UPSTREAM }}' SERVER_NAME='${{ secrets.FRONTEND_SERVER_NAME }}' /bin/bash /tmp/chinook/infra/scripts/deploy_frontend.sh"

      - name: Smoke test backend health from backend host
        shell: bash
        run: |
          set -euo pipefail

          # Validate the backend service directly on its native FastAPI route.
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}" \
            "bash /tmp/chinook/infra/scripts/smoke_test.sh http://127.0.0.1:8000 /health"

      - name: Smoke test public frontend path
        shell: bash
        run: |
          set -euo pipefail

          # Validate the final user-facing path through Nginx, which exposes the
          # backend health route under /api/health.
          bash infra/scripts/smoke_test.sh "${{ secrets.FRONTEND_BASE_URL }}" /api/health
