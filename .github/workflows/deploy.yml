name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  # Only allow one production deployment workflow per branch at a time.
  # This prevents two pushes from racing and deploying out of order.
  group: chinook-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing -q

  frontend-test-build:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    name: Deploy To EC2
    # Run deployment from a self-hosted Windows machine so the job uses the
    # same network reachability that already worked for the manual deploy.
    runs-on: [self-hosted, Windows, X64]
    needs: [backend-test, frontend-test-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Prepare SSH key and known hosts
        shell: pwsh
        run: |
          $sshDir = Join-Path $HOME ".ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          $keyPath = Join-Path $sshDir "id_ed25519"

          # The private key is stored base64-encoded in GitHub secrets so the
          # original line breaks are preserved safely.
          [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String("${{ secrets.SSH_PRIVATE_KEY_B64 }}"))

          # Try to pre-populate known_hosts, but do not fail the whole workflow
          # if a host-key scan is temporarily unavailable from the self-hosted runner.
          & ssh-keyscan -H "${{ secrets.BACKEND_HOST }}" 2>$null | Out-File -FilePath (Join-Path $sshDir "known_hosts") -Encoding ascii -Append
          & ssh-keyscan -H "${{ secrets.FRONTEND_HOST }}" 2>$null | Out-File -FilePath (Join-Path $sshDir "known_hosts") -Encoding ascii -Append

      - name: Prepare remote staging directories
        shell: pwsh
        run: |
          $keyPath = Join-Path $HOME ".ssh\id_ed25519"
          ssh -o StrictHostKeyChecking=accept-new -i $keyPath "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}" "rm -rf /tmp/chinook/backend /tmp/chinook/infra && mkdir -p /tmp/chinook"
          ssh -o StrictHostKeyChecking=accept-new -i $keyPath "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}" "rm -rf /tmp/chinook/frontend-dist /tmp/chinook/infra && mkdir -p /tmp/chinook"

      - name: Upload backend app and repo-managed scripts
        shell: pwsh
        run: |
          $keyPath = Join-Path $HOME ".ssh\id_ed25519"
          # Keep the deployment flow the same, but copy from the Windows runner
          # with scp because this self-hosted path avoids GitHub-hosted SSH timeouts.
          scp -o StrictHostKeyChecking=accept-new -i $keyPath -r backend "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}:/tmp/chinook/"
          scp -o StrictHostKeyChecking=accept-new -i $keyPath -r infra "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}:/tmp/chinook/"

      - name: Upload frontend artifact and repo-managed scripts
        shell: pwsh
        run: |
          $keyPath = Join-Path $HOME ".ssh\id_ed25519"
          scp -o StrictHostKeyChecking=accept-new -i $keyPath -r frontend/dist "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/chinook/frontend-dist"
          scp -o StrictHostKeyChecking=accept-new -i $keyPath -r infra "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/chinook/"

      - name: Deploy backend
        shell: pwsh
        run: |
          # Run the backend deployment script that came from this repository.
          # No /usr/local/bin server-side script is assumed.
          $keyPath = Join-Path $HOME ".ssh\id_ed25519"
          ssh -o StrictHostKeyChecking=accept-new -i $keyPath "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}" "sudo /bin/bash /tmp/chinook/infra/scripts/deploy_backend.sh"

      - name: Deploy frontend
        shell: pwsh
        run: |
          # The frontend deploy script renders the Nginx config using the
          # backend private URL and the public frontend server name.
          $keyPath = Join-Path $HOME ".ssh\id_ed25519"
          ssh -o StrictHostKeyChecking=accept-new -i $keyPath "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}" "sudo BACKEND_UPSTREAM='${{ secrets.BACKEND_UPSTREAM }}' SERVER_NAME='${{ secrets.FRONTEND_SERVER_NAME }}' /bin/bash /tmp/chinook/infra/scripts/deploy_frontend.sh"

      - name: Smoke test backend health from backend host
        shell: pwsh
        run: |
          # Validate the backend service directly on its native FastAPI route.
          $keyPath = Join-Path $HOME ".ssh\id_ed25519"
          ssh -o StrictHostKeyChecking=accept-new -i $keyPath "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}" "bash /tmp/chinook/infra/scripts/smoke_test.sh http://127.0.0.1:8000 /health"

      - name: Smoke test public frontend path
        shell: pwsh
        run: |
          # Validate the final user-facing path through Nginx, which exposes the
          # backend health route under /api/health.
          $response = Invoke-WebRequest -Uri "${{ secrets.FRONTEND_BASE_URL }}/api/health" -UseBasicParsing -TimeoutSec 30
          if ($response.StatusCode -ne 200) {
            throw "Smoke test failed with status $($response.StatusCode)"
          }
